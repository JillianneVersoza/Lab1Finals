<div class="pokedex container">
    <h2>Register New Pokemon</h2>
    <form [formGroup] ="pokemonForm" (ngSubmit) ="OnSubmit()" class="pokemon-form">

        <div class="form-group">
            <label for="name">Pokemon Name: </label>
            <input type="text" id="name"
            formControlName="name" placeholder="e.g. Pikachu"/>
        </div>
        <div class="form-group">
            <label for="level">Pokemon Level: </label>
            <input type="text" id="level"
            formControlName="level" />
          </div>   
          <div class="form-group">
            <label for="type">Pokemon Type: </label>
            <input type="text" id="type"
            formControlName="type" placeholder="e.g. Electric"/>
          </div>   
          <div class="form-group">
            <label for="nature">Pokemon Nature: </label>
            <input type="text" id="nature"
            formControlName="nature" placeholder="e.g. Modest"/>
          </div>   

<div class="form-actions">
    <button type="submit" [disabled] ="pokemonForm.invalid" 
    class="btn-submit">Catch Pokemon</button>
</div>
    </form>
</div>

<hr>

<h3>Current Pokedex</h3>
<div class="pokemon-grid">
    @for(p of pokemonService.pokemonList(); track p._id){
        <div class="pokemon-card">
            <div class="card-info">
                <strong> Name: {{ p.name }} </strong>
                <span>Level: {{ p.level }} </span>
                <p>Type: {{ p.type }} | Nature: {{ p.nature }} </p>
            </div>
        </div>
    }
</div>
